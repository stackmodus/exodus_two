<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exodus T.W.O - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>body { font-family: 'DM Sans', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-lg mx-auto px-4 py-12">
    <div class="text-center mb-8">
      <img src="https://exodustwo.org/wp-content/uploads/2023/06/EXODUS.png" alt="Exodus T.W.O" class="h-14 mx-auto mb-4" />
      <h1 class="font-serif text-2xl text-gray-900" style="font-family:'DM Serif Display'">Admin Settings</h1>
      <p class="text-gray-500 text-sm mt-1">Configure donation payment methods</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-5">
      <h2 class="font-semibold text-gray-900 flex items-center gap-2"><i class="fas fa-heart text-amber-500"></i> Donation Settings</h2>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fab fa-whatsapp text-green-500 mr-1"></i> WhatsApp Number
        </label>
        <input id="whatsapp" type="text" placeholder="+1 (555) 000-0000" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-amber-400 focus:border-amber-400 outline-none" />
        <p class="text-gray-400 text-xs mt-1">Include country code, e.g. +1 for US</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          <span class="inline-flex items-center justify-center w-4 h-4 bg-violet-600 rounded text-white text-[10px] font-bold mr-1">Z</span> Zelle Email or Phone
        </label>
        <input id="zelle" type="text" placeholder="info@exodustwo.org" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-amber-400 focus:border-amber-400 outline-none" />
        <p class="text-gray-400 text-xs mt-1">Email or phone number registered with Zelle</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          <i class="fab fa-paypal text-blue-600 mr-1"></i> PayPal Link
        </label>
        <input id="paypal" type="text" placeholder="https://paypal.me/exodustwo" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-amber-400 focus:border-amber-400 outline-none" />
        <p class="text-gray-400 text-xs mt-1">Your PayPal.me link or donation page URL</p>
      </div>

      <button onclick="saveSettings()" class="w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-lg font-semibold transition cursor-pointer">
        <i class="fas fa-save mr-2"></i>Save Settings
      </button>

      <div id="status" class="hidden text-center text-sm font-medium py-2 rounded-lg"></div>
    </div>

    <div class="mt-6 text-center">
      <a href="index.html" class="text-amber-600 hover:text-amber-700 text-sm font-medium"><i class="fas fa-arrow-left mr-1"></i> Back to Site</a>
    </div>
  </div>

  <script>
    const defaults = {
      whatsapp: '+1 (555) 000-0000',
      zelle: 'info@exodustwo.org',
      paypal: 'https://paypal.me/exodustwo'
    };

    // Load saved settings
    const saved = JSON.parse(localStorage.getItem('exodusDonate') || 'null') || defaults;
    document.getElementById('whatsapp').value = saved.whatsapp;
    document.getElementById('zelle').value = saved.zelle;
    document.getElementById('paypal').value = saved.paypal;

    function saveSettings() {
      const config = {
        whatsapp: document.getElementById('whatsapp').value.trim() || defaults.whatsapp,
        zelle: document.getElementById('zelle').value.trim() || defaults.zelle,
        paypal: document.getElementById('paypal').value.trim() || defaults.paypal,
      };
      localStorage.setItem('exodusDonate', JSON.stringify(config));
      const status = document.getElementById('status');
      status.className = 'text-center text-sm font-medium py-2 rounded-lg bg-green-50 text-green-700 border border-green-200';
      status.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Settings saved! Changes are live on the site.';
      setTimeout(() => status.className = 'hidden', 3000);
    }
  </script>
</body>
</html>
